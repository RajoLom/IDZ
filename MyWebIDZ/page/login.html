<!DOCTYPE html>
<html lang="ua">

<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/gallery.css" />
    <link rel="stylesheet" href="../css/reg.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/body.css" />
    <link rel="stylesheet" href="../css/footer.css" />
</head>

<body>
    <header>
        <div class="logo">
            <a class="nav-links" href="index.html"><img src="../res/svg/bee.svg" id="logo"></a>

        </div>
        <div class="headtext">
            <a class="nav-links" href="login.html">Login</a>
            /
            <a class="nav-links" href="register.html">Register</a>
            /
            <button class="theme-btn" id="themeToggle">
                <img src="../res/svg/moon.svg" alt="Тема" id="themeIcon">
            </button>
        </div>
    </header>
    <main>
        <div class="auth-container">
            <div class="auth-card">
                <h2>Login</h2>

                <form>
                    <input type="email" placeholder="Email" required>

                    <input type="password" placeholder="Password" required>

                    <button type="submit">Login</button>
                </form>
            </div>
        </div>
    </main>
    <footer>
        <div>
            <p>
                copyright
            </p>
        </div>
    </footer>
    <script>
        const button = document.getElementById('themeToggle');

        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('dark');
        }

        button.addEventListener('click', () => {
            document.body.classList.toggle('dark');

            if (document.body.classList.contains('dark')) {
                localStorage.setItem('theme', 'light');
            } else {
                localStorage.setItem('theme', 'dark');
            }
        });
        let slideIndex = 1;
        showSlides(slideIndex);


    </script>

</body>

</html>
